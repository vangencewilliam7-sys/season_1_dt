services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: persona_user
      POSTGRES_PASSWORD: persona_pass
      POSTGRES_DB: persona_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U persona_user -d persona_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://persona_user:persona_pass@db:5432/persona_db
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn runtime.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
